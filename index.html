<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0071e3" />
  <meta name="description" content="Jupyter-like PWA for authoring AI-agent specs with Markdown, PlantUML and JavaScript" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="mobileUML" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>mobileUML</title>

  <script type="importmap">
  {
    "imports": {
      "marked":                      "https://esm.sh/marked@12",
      "dompurify":                   "https://esm.sh/dompurify@3",
      "pako":                        "https://esm.sh/pako@2",
      "@lezer/highlight":            "https://esm.sh/@lezer/highlight@1",
      "@codemirror/state":           "https://esm.sh/@codemirror/state@6",
      "@codemirror/view":            "https://esm.sh/@codemirror/view@6",
      "@codemirror/commands":        "https://esm.sh/@codemirror/commands@6",
      "@codemirror/language":        "https://esm.sh/@codemirror/language@6?external=@lezer/highlight",
      "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6?external=@lezer/highlight",
      "@codemirror/lang-markdown":   "https://esm.sh/@codemirror/lang-markdown@6?external=@lezer/highlight",
      "@codemirror/theme-one-dark":  "https://esm.sh/@codemirror/theme-one-dark@6?external=@lezer/highlight"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <!-- ── Main toolbar ────────────────────────────── -->
  <header id="toolbar">
    <button id="btn-sidebar" class="btn" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>

    <input id="doc-title" type="text" placeholder="Document title" aria-label="Document title" />

    <button id="btn-new" class="btn" title="New document">
      <span>＋</span><span class="btn-label"> New</span>
    </button>
    <button id="btn-import" class="btn" title="Import .json notebook">
      <span>⬆</span><span class="btn-label"> Import</span>
    </button>
    <button id="btn-export" class="btn" title="Export .json notebook">
      <span>⬇</span><span class="btn-label"> JSON</span>
    </button>
    <button id="btn-export-md" class="btn" title="Export as Markdown (.md)">
      <span>⬇</span><span class="btn-label"> MD</span>
    </button>
    <button id="btn-reset-js" class="btn" title="Reset JavaScript sandbox (clears global scope)">
      <span>↺</span><span class="btn-label"> Reset JS</span>
    </button>

    <span class="toolbar-sep" aria-hidden="true"></span>

    <label for="editor-font-size" class="toolbar-label">Size</label>
    <select id="editor-font-size" title="Editor font size" aria-label="Editor font size">
      <option value="11">11px</option>
      <option value="12">12px</option>
      <option value="13">13px</option>
      <option value="14">14px</option>
      <option value="15">15px</option>
      <option value="16">16px</option>
      <option value="18">18px</option>
      <option value="20">20px</option>
    </select>
  </header>

  <!-- ── Body ─────────────────────────────────────── -->
  <div id="main">

    <!-- Sidebar -->
    <nav id="sidebar" aria-label="Documents">
      <div id="sidebar-header">
        <span>Documents</span>
      </div>
      <div id="doc-list" role="list"></div>
    </nav>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" role="presentation"></div>

    <!-- Notebook area -->
    <main id="notebook-area">
      <div id="notebook" role="list" aria-label="Notebook cells"></div>

      <!-- Add cell bar -->
      <div id="add-cell-bar" aria-label="Add cell">
        <button id="btn-add-md"  class="btn btn-add-md"  title="Add Markdown cell">＋ Markdown</button>
        <button id="btn-add-uml" class="btn btn-add-uml" title="Add PlantUML cell">＋ PlantUML</button>
        <button id="btn-add-js"  class="btn btn-add-js"  title="Add JavaScript cell">＋ JavaScript</button>
      </div>
    </main>

  </div><!-- #main -->
</div><!-- #app -->

<script type="module" src="./js/app.js"></script>
</body>
</html>
